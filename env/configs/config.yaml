project:
  name: real-market-rl-trader
  python_version: "3.10+"

data:
  raw_dir: data/raw
  processed_dir: data/processed
  symbol: "005930"
  interval: 1m

environment:
  initial_cash: 10000.0
  unit_fraction: 0.20
  max_units: 5
  episode_days: 20            # 학습 episode = 연속 20거래일
  nominal_bars_per_day: 64    # duration_horizon_bars = episode_days * nominal_bars_per_day
  risk_penalty_rate: 0.0
  turnover_penalty_rate: 0.0
  # Primary objective: friction-adjusted compounded portfolio growth.
  # Risk and benchmark shaping stay available for explicit ablation runs.
  drawdown_penalty_rate: 0.0
  downside_penalty_rate: 0.0
  benchmark_relative_rate: 0.0
  reward_scale: 100.0
  reward_return_mode: log_return
  action_space:
    0: Hold
    1: Add 1 Unit
    2: Clear

friction:
  fee_rate: 0.001
  spread_rate: 0.0005
  slippage_rate: 0.0005
  execution_uncertainty_rate: 0.0
  sell_tax_rate: 0.002   # 코스피 매도 거래세(증권거래세 0.05% + 농어촌특별세 0.15%, 2026년)

agent:
  type: rl
  baseline_name: buy_and_hold
  rl_model_name: MaskablePPO
  total_timesteps: 300000
  normalization:
    enabled: true
    clip: 5.0
  tensorboard:
    enabled: true
    log_dir: runs/tensorboard
    log_name: maskable_ppo_005930
  validation:
    enabled: true
    eval_freq: 25000
    deterministic: true
    seed: 42
    verbose: 1
  ppo:
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.999
    gae_lambda: 0.98
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    target_kl: 0.03
    policy_kwargs:
      net_arch: [128, 128]
    verbose: 1

backtest:
  max_steps:
  benchmark: buy_and_hold


seed: 42
