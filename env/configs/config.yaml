project:
  name: real-market-rl-trader
  python_version: "3.10+"

data:
  raw_dir: data/raw
  processed_dir: data/processed
  symbol: "005930"
  interval: 1m

environment:
  initial_cash: 10000.0
  unit_fraction: 0.199  # friction 내고도 5 Unit 도달 가능하게 (0.20이면 수수료 4원 부족)
  max_units: 5
  episode_days: 20            # 학습 episode = 연속 20거래일
  nominal_bars_per_day: 64    # duration_horizon_bars = episode_days * nominal_bars_per_day
  risk_penalty_rate: 0.0
  turnover_penalty_rate: 0.0
  # Primary objective: friction-adjusted compounded portfolio growth.
  # Risk and benchmark shaping stay available for explicit ablation runs.
  drawdown_penalty_rate: 0.0
  downside_penalty_rate: 0.0
  benchmark_relative_rate: 0.0
  reward_scale: 100.0
  reward_return_mode: log_return
  action_space:
    0: Hold
    1: Add 1 Unit
    2: Clear

friction:
  # 2026-07 실측·검증 기반 정밀 보정 (한투 API 기준):
  # 수수료 = 뱅키스 0.0140527% + 유관기관 제비용 0.0036% ≈ 0.018%/side
  fee_rate: 0.00018
  # dynamic_spread: half-spread = 0.5 × KRX tick(price) / price
  # (가격이 틱 경계 20만원을 넘나들어 정적 비율은 부정확). spread_rate는 fallback.
  dynamic_spread: true
  spread_rate: 0.001
  # 소액 주문(수천 원 notional)은 삼성전자 최우선호가 잔량 대비 슬리피지 사실상 0
  slippage_rate: 0.0
  execution_uncertainty_rate: 0.0
  # 체결일 기준 세율 연혁 적용: 2025년 0.15% → 2026년~ 0.20%. sell_tax_rate는 fallback.
  date_based_sell_tax: true
  sell_tax_rate: 0.002

agent:
  type: rl
  baseline_name: buy_and_hold
  rl_model_name: MaskablePPO
  total_timesteps: 300000
  normalization:
    enabled: true
    clip: 5.0
  tensorboard:
    enabled: true
    log_dir: runs/tensorboard
    log_name: maskable_ppo_005930
  validation:
    enabled: true
    eval_freq: 25000
    deterministic: true
    seed: 42
    verbose: 1
  ppo:
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.999
    gae_lambda: 0.98
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    target_kl: 0.03
    policy_kwargs:
      net_arch: [128, 128]
    verbose: 1

backtest:
  max_steps:
  benchmark: buy_and_hold


seed: 42
