project:
  name: real-market-rl-trader
  python_version: "3.10+"

data:
  raw_dir: data/raw
  processed_dir: data/processed
  symbol: "005930"
  interval: 1m

environment:
  initial_cash: 10000.0
  unit_fraction: 0.20
  max_units: 5
  risk_penalty_rate: 0.0
  action_space:
    0: Hold
    1: Add 1 Unit
    2: Clear

friction:
  fee_rate: 0.001
  spread_rate: 0.0005
  slippage_rate: 0.0005
  execution_uncertainty_rate: 0.0
  sell_tax_rate: 0.002   # 코스피 매도 거래세(증권거래세 0.05% + 농어촌특별세 0.15%, 2026년)

agent:
  type: baseline
  baseline_name: buy_and_hold
  rl_model_name: PPO
  total_timesteps: 10000

backtest:
  max_steps:
  benchmark: buy_and_hold


seed: 42
